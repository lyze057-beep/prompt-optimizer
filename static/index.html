<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生图提示词优化工具</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1a18;
    --text-muted: #7a7870;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --accent-border: #bfdbfe;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --success-text: #166534;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.6;
  }

  .container { max-width: 720px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }
  header p { font-size: 14px; color: var(--text-muted); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
  }

  .tag-group { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    font-size: 13px;
    padding: 5px 12px;
    border-radius: 99px;
    border: 1px solid var(--border);
    cursor: pointer;
    color: var(--text-muted);
    background: transparent;
    transition: all 0.15s;
    user-select: none;
  }
  .tag:hover { border-color: #aaa; color: var(--text); }
  .tag.active {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent);
    font-weight: 500;
  }

  .input-area {
    width: 100%;
    min-height: 100px;
    font-size: 15px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    resize: vertical;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  .input-area:focus { outline: none; border-color: var(--accent); }
  .input-area::placeholder { color: var(--text-muted); }

  .btn-row { display: flex; gap: 8px; margin-top: 10px; }

  .btn {
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--text-muted); }
  .btn-ghost:hover { background: var(--bg); }

  .result-section { display: none; }
  .result-section.visible { display: block; }

  .result-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 10px;
  }

  .result-block-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .result-block-text {
    font-size: 14px;
    color: var(--text);
    line-height: 1.7;
    word-break: break-word;
  }

  .result-block.positive {
    background: var(--accent-bg);
    border-color: var(--accent-border);
  }
  .result-block.positive .result-block-label { color: var(--accent); }
  .result-block.positive .result-block-text { font-family: "SF Mono", "Fira Code", monospace; font-size: 13px; }

  .result-block.tips {
    background: var(--success-bg);
    border-color: var(--success-border);
  }
  .result-block.tips .result-block-label { color: var(--success-text); }
  .result-block.tips .result-block-text { color: var(--success-text); }

  .copy-btn {
    font-size: 12px;
    padding: 3px 10px;
    margin-top: 8px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--text-muted);
    font-family: inherit;
    transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--bg); }

  .loading {
    display: none;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    color: var(--text-muted);
    padding: 1rem 0;
  }
  .loading.visible { display: flex; }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    display: none;
    font-size: 13px;
    color: #b91c1c;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    margin-top: 8px;
  }
  .error-msg.visible { display: block; }

  .status-dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #ccc;
    margin-right: 5px;
    vertical-align: middle;
  }
  .status-dot.online { background: #22c55e; }

  footer {
    margin-top: 2rem;
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>生图提示词优化工具</h1>
    <p>视频工作流场景 · 输入粗糙描述，自动生成规范提示词</p>
  </header>

  <div class="card">
    <div class="card-title">目标工具</div>
    <div class="tag-group" id="toolGroup">
      <span class="tag active" data-val="Midjourney">Midjourney</span>
      <span class="tag" data-val="Stable Diffusion">Stable Diffusion</span>
      <span class="tag" data-val="ComfyUI">ComfyUI</span>
      <span class="tag" data-val="Flux">Flux</span>
      <span class="tag" data-val="DALL-E">DALL-E</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">画面风格</div>
    <div class="tag-group" id="styleGroup">
      <span class="tag active" data-val="写实摄影">写实摄影</span>
      <span class="tag" data-val="电影感">电影感</span>
      <span class="tag" data-val="动漫插画">动漫插画</span>
      <span class="tag" data-val="概念艺术">概念艺术</span>
      <span class="tag" data-val="3D渲染">3D渲染</span>
      <span class="tag" data-val="水彩">水彩</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">输入描述</div>
    <textarea
      class="input-area"
      id="inputText"
      placeholder="例如：一个女生在咖啡店里坐着，光线很好，感觉很文艺"
    ></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" id="submitBtn" onclick="optimize()">优化提示词</button>
      <button class="btn btn-ghost" onclick="clearAll()">清空</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>正在优化，请稍候...</span>
  </div>

  <div class="result-section" id="resultSection">
    <div class="result-block positive">
      <div class="result-block-label">正向提示词</div>
      <div class="result-block-text" id="resPositive"></div>
      <button class="copy-btn" onclick="copy('resPositive', this)">复制</button>
    </div>
    <div class="result-block">
      <div class="result-block-label">负向提示词</div>
      <div class="result-block-text" id="resNegative"></div>
      <button class="copy-btn" onclick="copy('resNegative', this)">复制</button>
    </div>
    <div class="result-block">
      <div class="result-block-label">中文释义</div>
      <div class="result-block-text" id="resExplanation"></div>
    </div>
    <div class="result-block tips">
      <div class="result-block-label">使用建议</div>
      <div class="result-block-text" id="resTips"></div>
    </div>
  </div>

  <footer>
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">检查 Ollama 连接中...</span>
  </footer>
</div>

<script>
// 初始化 tag 单选
function initTagGroup(groupId) {
  const group = document.getElementById(groupId);
  group.querySelectorAll('.tag').forEach(tag => {
    tag.onclick = () => {
      group.querySelectorAll('.tag').forEach(t => t.classList.remove('active'));
      tag.classList.add('active');
    };
  });
}
initTagGroup('toolGroup');
initTagGroup('styleGroup');

function getActive(groupId) {
  return document.getElementById(groupId).querySelector('.tag.active')?.dataset.val || '';
}

// 检查 Ollama 状态
async function checkHealth() {
  try {
    const resp = await fetch('/api/health');
    const data = await resp.json();
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    if (data.status === 'ok') {
      dot.className = 'status-dot online';
      txt.textContent = `Ollama 已连接 · 模型: ${data.model}`;
    } else {
      txt.textContent = 'Ollama 未连接，请先启动 Ollama';
    }
  } catch {
    document.getElementById('statusText').textContent = 'Ollama 未连接，请先启动 Ollama';
  }
}
checkHealth();

async function optimize() {
  const input = document.getElementById('inputText').value.trim();
  if (!input) return;

  const btn = document.getElementById('submitBtn');
  const loading = document.getElementById('loading');
  const errorMsg = document.getElementById('errorMsg');
  const resultSection = document.getElementById('resultSection');

  btn.disabled = true;
  loading.className = 'loading visible';
  errorMsg.className = 'error-msg';
  resultSection.className = 'result-section';

  try {
    const resp = await fetch('/api/optimize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        input,
        tool: getActive('toolGroup'),
        style: getActive('styleGroup'),
      })
    });

    const data = await resp.json();

    if (!resp.ok || data.error) {
      throw new Error(data.error || '服务异常，请重试');
    }

    document.getElementById('resPositive').textContent = data.positive;
    document.getElementById('resNegative').textContent = data.negative;
    document.getElementById('resExplanation').textContent = data.explanation;
    document.getElementById('resTips').textContent = data.tips;
    resultSection.className = 'result-section visible';

  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.className = 'error-msg visible';
  } finally {
    btn.disabled = false;
    loading.className = 'loading';
  }
}

function clearAll() {
  document.getElementById('inputText').value = '';
  document.getElementById('resultSection').className = 'result-section';
  document.getElementById('errorMsg').className = 'error-msg';
}

function copy(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '已复制 ✓';
    setTimeout(() => btn.textContent = '复制', 1500);
  });
}

// 支持 Ctrl+Enter 提交
document.getElementById('inputText').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) optimize();
});
</script>
</body>
</html>
